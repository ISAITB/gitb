<div class="modal-header">
    <div class="modal-title">{{headerText}}</div>
    <div tabindex="-1" class="modal-focus-anchor" ngbAutofocus></div>
</div>
<div class="modal-body py-4">
    {{bodyText}}
</div>
<div class="modal-footer">
    <div class="btn-toolbar">
        @if (!oneButton) {
            <button [labelIcon]="closeButtonIcon" [ngClass]="cancelClass()" type="button" (click)="cancel()">{{closeButtonText}}</button>
        }
        <button [labelIcon]="actionButtonIcon" [ngClass]="actionClass" type="button" (click)="ok()">{{actionButtonText}}</button>
    </div>
</div>
