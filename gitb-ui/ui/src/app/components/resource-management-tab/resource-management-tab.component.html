<div class="tabPanel">
    <div class="tabControls">
        <div class="searchControls btn-toolbar">
            <app-text-filter name="resourceFilter" [width]="300" [placeholder]="'Search resources...'" [(ngModel)]="state.filter" (apply)="applyResourceFilter()"></app-text-filter>
            <div class="btn-group" ngbDropdown>
                <button type="button" [labelIcon]="Constants.BUTTON_ICON.UPLOAD" class="btn btn-secondary" (click)="uploadResource()" [disable]="downloadAllResourcesPending || selectingForDeleteResources">Upload resource</button>
                <button id="button-upload-resource" ngbDropdownToggle type="button" class="btn btn-secondary dropdown-toggle dropdown-toggle-split" aria-controls="dropdown-upload-resource" [disabled]="downloadAllResourcesPending || selectingForDeleteResources">
                    <span class="caret"></span>
                    <span class="sr-only visually-hidden"></span>
                </button>
                <div id="dropdown-upload-resource" ngbDropdownMenu>
                    <button ngbDropdownItem type="button" (click)="uploadResourceBulk()">Bulk upload</button>
                </div>
            </div>
            <button type="button" [labelIcon]="Constants.BUTTON_ICON.DOWNLOAD" class="btn btn-secondary" (click)="downloadAllResources()" [disable]="state.resources.length == 0 || selectingForDeleteResources" [pending]="downloadAllResourcesPending">Download all</button>
            @if (!selectingForDeleteResources) {
                <button type="button" [labelIcon]="Constants.BUTTON_ICON.DELETE" class="btn btn-secondary" (click)="selectDeleteResources()" [disable]="state.resources.length == 0 || downloadAllResourcesPending">Delete resources...</button>
            } @else {
                <button type="button" [labelIcon]="Constants.BUTTON_ICON.CANCEL" class="btn btn-secondary" (click)="cancelDeleteResources()" [disable]="deleteResourcesPending">Cancel</button>
                <button type="button" [labelIcon]="Constants.BUTTON_ICON.CONFIRM" class="btn btn-outline-danger" (click)="confirmDeleteResources()" [disable]="!resourcesChecked()" [pending]="deleteResourcesPending">Confirm</button>
            }
        </div>
    </div>
    <div class="card">
        <div #resourcesTable table-directive
             [columns]="resourceColumns"
             [data]="state.resources"
             noDataMessage="No resources found"
             [loadingStatus]="state"
             [contentRefreshing]="resourcesRefreshing"
             [allowSelect]="true"
             [actionVisible]="true"
             [operationsVisible]="true"
             [exportVisible]="true"
             [actionIcon]="Constants.BUTTON_ICON.CLIPBOARD"
             [exportIcon]="Constants.BUTTON_ICON.DOWNLOAD"
             [actionTooltip]="'Copy resource reference'"
             [exportTooltip]="'Download'"
             [clearSelection]="clearResourceSelections"
             [deletePendingProperty]="'deletePending'"
             [exportPendingProperty]="'downloadPending'"
             [checkboxEnabled]="selectingForDeleteResources"
             (onSelect)="selectResource($event)"
             (onAction)="copyResourceReference($event)"
             (onExport)="downloadResource($event)"
             (onDelete)="deleteResource($event)"
             (pageNavigation)="doPageNavigation($event)"
             [supportPaging]="true">
        </div>
    </div>
</div>
