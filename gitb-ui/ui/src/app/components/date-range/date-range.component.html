<div #input class="input-group">
    <input type="text" [value]="displayValue" autocomplete="off" class="form-control" [class.clickable]="true" (click)="toggle()" readonly="readonly"/>
    <button class="btn btn-secondary" type="button" (click)="clear()" [disabled]="beginDate == undefined && endDate == undefined" tooltipClass="shortTooltip" container="body" ngbTooltip="Clear" [openDelay]="Constants.TOOLTIP_DELAY" [triggers]="'mouseover:mouseout'"><i [class]="Constants.BUTTON_ICON.CANCEL"></i></button>
</div>
<ng-template #popupTemplate>
    <div class="itb-style-root selection-panel">
        <div class="selection-panel-close" (click)="close()">
            <span><i [class]="Constants.BUTTON_ICON.CANCEL"></i></span>
        </div>
        <div class="selection-panel-section">
            <div class="selection-label fw-bold pb-2">
                Select period
            </div>
            <div class="selection-preset-options">
                <div class="btn-group preset-item" ngbDropdown>
                    <button type="button" class="btn btn-secondary" ngbDropdownToggle>Current ...</button>
                    <div ngbDropdownMenu aria-labelledby="button-preset-current">
                        <button ngbDropdownItem type="button" (click)="setCurrentWeek()">Week</button>
                        <button ngbDropdownItem type="button" (click)="setCurrentMonth()">Month</button>
                        <button ngbDropdownItem type="button" (click)="setCurrentYear()">Year</button>
                    </div>
                </div>
                <div class="btn-group preset-item" ngbDropdown>
                    <button type="button" class="btn btn-secondary" ngbDropdownToggle>Previous ...</button>
                    <div ngbDropdownMenu aria-labelledby="button-preset-previous">
                        <button ngbDropdownItem type="button" (click)="setPreviousWeek()">Week</button>
                        <button ngbDropdownItem type="button" (click)="setPreviousMonth()">Month</button>
                        <button ngbDropdownItem type="button" (click)="setPreviousYear()">Year</button>
                    </div>
                </div>
                <div class="btn-group preset-item" ngbDropdown>
                    <button type="button" class="btn btn-secondary" ngbDropdownToggle>Last ...</button>
                    <div ngbDropdownMenu aria-labelledby="button-preset-last">
                        <button ngbDropdownItem type="button" (click)="setLastDays(7)">7 days</button>
                        <button ngbDropdownItem type="button" (click)="setLastDays(30)">30 days</button>
                        <button ngbDropdownItem type="button" (click)="setLastDays(180)">6 months</button>
                        <button ngbDropdownItem type="button" (click)="setLastDays(365)">12 months</button>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary preset-item" (click)="setToday()">Today</button>
                <button type="button" class="btn btn-secondary preset-item" (click)="setYesterday()">Yesterday</button>
            </div>
        </div>
        <div class="selection-panel-section">
            <div class="selection-label fw-bold pb-2">
                Custom range
            </div>
            <div class="selection-custom-options d-flex gap-2 flex-column">
                <div class="selection-custom-options-dates">
                    <div class="input-group flex-grow-1">
                        <span class="input-group-text">Begin</span>
                        <input name="customBegin"
                               class="form-control"
                               ngbDatepicker
                               placeholder="dd-mm-yyyy"
                               [(ngModel)]="beginDate"
                               [maxDate]="startMaxDate"
                               [footerTemplate]="beginFooterTemplate"
                               #customBegin="ngbDatepicker"/>
                        <button class="btn btn-secondary" type="button" (click)="customBegin.toggle()"><i [class]="Constants.BUTTON_ICON.DATE"></i></button>
                    </div>
                    <div class="input-group flex-grow-1">
                        <span class="input-group-text">End</span>
                        <input name="customEnd"
                               class="form-control"
                               ngbDatepicker
                               placeholder="dd-mm-yyyy"
                               [(ngModel)]="endDate"
                               [minDate]="endMinDate"
                               [footerTemplate]="endFooterTemplate"
                               #customEnd="ngbDatepicker"/>
                        <button class="btn btn-secondary" type="button" (click)="customEnd.toggle()"><i [class]="Constants.BUTTON_ICON.DATE"></i></button>
                    </div>
                </div>
                <div class="d-flex">
                    <button type="button" [labelIcon]="Constants.BUTTON_ICON.CONFIRM" class="btn btn-secondary text-nowrap" (click)="applyCustomRange()">Apply</button>
                </div>
            </div>
        </div>
    </div>
</ng-template>
<ng-template #beginFooterTemplate>
    <div class="d-flex justify-content-between p-2">
        <button class="btn btn-sm btn-secondary" (click)="beginDate = copyToday(); customBegin?.close()" [disable]="!todayEnabledForBegin()" [labelIcon]="Constants.BUTTON_ICON.TODAY">Today</button>
        <button class="btn btn-sm btn-secondary" (click)="beginDate = undefined; customBegin?.close()" [disable]="beginDate == undefined" [labelIcon]="Constants.BUTTON_ICON.SKIP">Clear</button>
    </div>
</ng-template>
<ng-template #endFooterTemplate>
    <div class="d-flex justify-content-between p-2">
        <button class="btn btn-sm btn-secondary" (click)="endDate = copyToday(); customEnd?.close()" [disable]="!todayEnabledForEnd()" [labelIcon]="Constants.BUTTON_ICON.TODAY">Today</button>
        <button class="btn btn-sm btn-secondary" (click)="endDate = undefined; customEnd?.close()" [disable]="endDate == undefined" [labelIcon]="Constants.BUTTON_ICON.SKIP">Clear</button>
    </div>
</ng-template>
