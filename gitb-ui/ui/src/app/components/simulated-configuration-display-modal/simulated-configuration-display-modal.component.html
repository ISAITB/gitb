<div class="modal-header">
	<div class="modal-title">Simulated configurations</div>
    <div tabindex="-1" class="modal-focus-anchor" ngbAutofocus></div>
</div>
<div class="modal-body">
    @for (item of items; track $index) {
        <div class="itemContainer">
            <app-any-content-view [context]="item"></app-any-content-view>
        </div>
    }
</div>
<div class="modal-footer">
    <div class="btn-toolbar">
        <button type="button" [labelIcon]="Constants.BUTTON_ICON.CANCEL" (click)="close()" class="btn btn-secondary">Close</button>
    </div>
</div>
