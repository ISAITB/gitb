<div class="rootContainer" (click)="$event.stopPropagation()" [class.shaded]="shaded">
    <div class="statusRootContainer" #containerRoot>
        <div class="statusContainerGroup" [ngbTooltip]="completed + ' passed, '+failed+' failed, '+other+' incomplete required '+tooltipRequiredTestDescription+' ('+(completed+failed+other)+' in total)'" [placement]="tooltipOnLeft?'left':'top'" container="body" [openDelay]="Constants.TOOLTIP_DELAY">
            <div class="statusContainer"><div class="statusCount">{{ completed }}</div><div class="statusIcon"><span><i [class]="successIcon"></i></span></div></div>
            <div class="statusContainer"><div class="statusCount">{{ failed }}</div><div class="statusIcon"><span><i [class]="failedIcon"></i></span></div></div>
            <div class="statusContainer"><div class="statusCount">{{ other }}</div><div class="statusIcon"><span><i [class]="otherIcon"></i></span></div></div>
        </div>
        @if (hasIgnored) {
            <div class="expand-icon" (click)="expand()" ngbTooltip="Expand" tooltipClass="shortTooltip" [openDelay]="Constants.TOOLTIP_DELAY"><span><i [class]="Constants.BUTTON_ICON.MORE"></i></span></div>
        }
    </div>
    @if (expanded) {
        <div class="popup-panel" [class.asLine]="asLine" [class.defaultPopup]="!asLine" (click)="$event.stopPropagation()">
            <div class="popup-panel-container">
                <div class="status-containers">
                    <div class="status-container">
                        <div class="status-title">Required</div>
                        <div class="statusRootContainer" [ngbTooltip]="completed + ' passed, '+failed+' failed, '+other+' incomplete required '+tooltipRequiredTestDescription+' ('+(completed+failed+other)+' in total)'" [placement]="tooltipOnLeft?'left':'top'" container="body" [openDelay]="Constants.TOOLTIP_DELAY">
                            <div class="statusContainer"><div class="statusCount">{{ completed }}</div><div class="statusIcon"><span><i [class]="successIcon"></i></span></div></div>
                            <div class="statusContainer"><div class="statusCount">{{ failed }}</div><div class="statusIcon"><span><i [class]="failedIcon"></i></span></div></div>
                            <div class="statusContainer"><div class="statusCount">{{ other }}</div><div class="statusIcon"><span><i [class]="otherIcon"></i></span></div></div>
                        </div>
                    </div>
                    <div class="status-container optional">
                        <div class="status-title optional">Ignored</div>
                        <div class="statusRootContainer" [ngbTooltip]="completedIgnored + ' passed, '+failedIgnored+' failed, '+otherIgnored+' incomplete ignored test cases ('+(completedIgnored+failedIgnored+otherIgnored)+' in total)'" [placement]="tooltipOnLeft?'left':'top'" container="body" [openDelay]="Constants.TOOLTIP_DELAY">
                            <div class="statusContainer"><div class="statusCount">{{ completedIgnored }}</div><div class="statusIcon"><span><i [class]="successIcon"></i></span></div></div>
                            <div class="statusContainer"><div class="statusCount">{{ failedIgnored }}</div><div class="statusIcon"><span><i [class]="failedIcon"></i></span></div></div>
                            <div class="statusContainer"><div class="statusCount">{{ otherIgnored }}</div><div class="statusIcon"><span><i [class]="otherIcon"></i></span></div></div>
                        </div>
                    </div>
                </div>
                <div class="close-container" (click)="close()"><span><i [class]="Constants.BUTTON_ICON.CANCEL"></i></span></div>
            </div>
        </div>
    }
</div>
