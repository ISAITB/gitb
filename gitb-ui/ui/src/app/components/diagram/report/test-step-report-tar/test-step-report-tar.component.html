@if (hasContextItems || hasReportItems) {
    @if (hasContextItems) {
        <div class="col-12 context-section">
            <app-any-content-view [context]="report.context!" [report]="report" [sessionId]="sessionId" [noBorder]="true"></app-any-content-view>
        </div>
    }
    @if (hasReportItems) {
        <div class="col-12 report-section" [class.with-context]="hasContextItems">
            <app-tar-report [reports]="report.reports!.assertionReports" [selectable]="true" (selected)="openAssertionReport($event)"></app-tar-report>
        </div>
    }
} @else {
    <div class="pending-container">
        <div class="pending-message">No details are included in this step's report.</div>
    </div>
}
