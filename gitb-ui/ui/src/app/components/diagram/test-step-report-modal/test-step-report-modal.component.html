<div class="modal-header">
    <div tabindex="-1" class="modal-focus-anchor" ngbAutofocus></div>
	<div class="modal-title">Step report</div>
    <div class="ms-auto">
        <app-tag label="fa-solid fa-clock" [icon]="true" [tooltipText]="'Step completion time'" [value]="report.date"></app-tag>
    </div>
    <div class="ms-3">
        <app-result-label [status]="report.result!"></app-result-label>
    </div>
</div>
<div class="modal-body">
	<app-test-step-report id="report" [step]="step" [report]="report" [sessionId]="sessionId"></app-test-step-report>
</div>
<div class="modal-footer button-container">
	<div class="btn-toolbar">
		<button type="button" [labelIcon]="Constants.BUTTON_ICON.CANCEL" class="btn btn-secondary" (click)="close()">Close</button>
		<div class="btn-group" ngbDropdown>
			<button type="button" [labelIcon]="Constants.BUTTON_ICON.REPORT" [disable]="exportPdfPending || exportXmlPending" [pending]="exportPdfPending || exportXmlPending" class="btn btn-secondary" (click)="exportPdf()">Download report</button>
			<button id="button-export" [disabled]="exportPdfPending || exportXmlPending" type="button" ngbDropdownToggle class="btn btn-secondary dropdown-toggle dropdown-toggle-split">
				<span class="caret"></span>
				<span class="sr-only visually-hidden">Download report</span>
			</button>
			<div id="dropdown-export" ngbDropdownMenu aria-labelledby="button-export">
				<button ngbDropdownItem type="button" (click)="exportXml()">Download report as XML</button>
			</div>
		</div>
	</div>
</div>
