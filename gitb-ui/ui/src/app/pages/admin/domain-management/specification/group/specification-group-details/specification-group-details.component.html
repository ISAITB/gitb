<div class="page domains detail detail-spec">
	<div class="card mb-0">
		<div class="card-header">
			<div class="card-title">{{dataService.labelSpecificationGroup()}} details</div>
            <div app-domain-tag-indicator></div>
		</div>
		<form (ngSubmit)="saveGroupChanges()">
			<div class="card-body" [pending]="!loaded" focus="shortName">
                <app-specification-group-form [group]="group"></app-specification-group-form>
			</div>
			<div class="card-footer button-container">
				<div class="btn-toolbar">
					<button type="submit" [labelIcon]="Constants.BUTTON_ICON.SAVE" class="btn btn-secondary" [disable]="saveDisabled()" [pending]="savePending">Save changes</button>
					<button (click)="back()" [labelIcon]="Constants.BUTTON_ICON.BACK" type="button" class="btn btn-secondary">Back</button>
				</div>
				<div class="btn-toolbar btn-toolbar-delete">
                    <div class="btn-group" ngbDropdown>
                        <button id="button-delete" [labelIcon]="Constants.BUTTON_ICON.DELETE" [disable]="!loaded || savePending" [pending]="deletePending" ngbDropdownToggle type="button" class="btn btn-outline-danger dropdown-toggle" aria-controls="dropdown-delete"><span class="me-2">Delete</span></button>
                        <div id="dropdown-delete" ngbDropdownMenu aria-labelledby="button-result">
                            <button ngbDropdownItem type="button" (click)="deleteGroup(false)">Delete this {{dataService.labelSpecificationGroupLower()}} but keep its {{dataService.labelSpecificationInGroupsLower()}}</button>
                            <button ngbDropdownItem type="button" (click)="deleteGroup(true)">Delete this {{dataService.labelSpecificationGroupLower()}} and all its {{dataService.labelSpecificationInGroupsLower()}}</button>
                        </div>
                    </div>
				</div>
			</div>
		</form>
	</div>
</div>
