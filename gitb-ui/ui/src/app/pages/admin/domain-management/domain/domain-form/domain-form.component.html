<div class="row">
    <label class="col-3 col-form-label text-end" for="shortName">* Short name:</label>
    <div class="col-8 col-md-6"><input id="shortName" name="shortName" [(ngModel)]="domain.sname" class="form-control" type="text"></div>
    <div app-tooltip class="col-auto" [tbTooltip]="'This is used to display the '+dataService.labelDomainLower()+' in selection lists (e.g. search filters) and tables (e.g. conformance statement creation wizard) where space is limited. Ensure this is short but still understandable by users.'"></div>
</div>
<div class="row mt-3">
    <label class="col-3 col-form-label text-end" for="fullName">* Full name:</label>
    <div class="col-8 col-md-6"><input id="fullName" name="fullName" [(ngModel)]="domain.fname" class="form-control" type="text"></div>
    <div app-tooltip class="col-auto" [tbTooltip]="'This is used to display the '+dataService.labelDomainLower()+' in detail forms and reports.'"></div>
</div>
<div class="row mt-3">
    <label class="col-3 col-form-label text-end" for="description">Description:</label>
    <div class="col-8 col-md-6">
        <textarea ctrlEnterSubmit id="description" name="description" [(ngModel)]="domain.description" class="form-control"></textarea>
    </div>
    <div app-tooltip class="col-auto" [tbTooltip]="'This is used to describe and contextualise the '+dataService.labelSpecificationsLower()+' included in the '+dataService.labelDomainLower()+'. It is visible to users when managing conformance statements and may also be used as a community\'s description during self-registration (if enabled).'"></div>
</div>
<div class="row mt-3">
    <label class="col-3 col-form-label text-end" for="metadata">Report metadata:</label>
    <div class="col-8 col-md-6">
        <textarea ctrlEnterSubmit id="metadata" name="metadata" [(ngModel)]="domain.reportMetadata" class="form-control"></textarea>
    </div>
    <div app-tooltip class="col-auto" [tbTooltip]="'This is optional, free-text metadata for the '+dataService.labelDomainLower()+' that if specified will be included in XML reports. This is not included in PDF reports nor presented on the user interface.'"></div>
</div>
<div class="row mt-3">
    <label class="col-3 col-form-label text-end">Tag:</label>
    <div class="col-8 col-md-6">
        <div class="tag-container">
            <app-tags-display
                [tags]="domain.tags"
                [editable]="true"
                [max]="1"
                [tooltip]="`An optional tag to display for the ${dataService.labelDomainLower()} in lists, and on all screens used to manage its configuration. This is only displayed internally to Test Bed and community administrators.`"
                (added)="tagAdded()"
            ></app-tags-display>
        </div>
    </div>
</div>
<div [ngbCollapse]="domain.tags == undefined || domain.tags.length == 0" [animation]="animationsEnabled">
    <div class="row pt-3">
        <div class="offset-3 col-9">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="tagForCommunityAdmin" name="tagForCommunityAdmin" [(ngModel)]="domain.tagForCommunityAdmin">
                <label class="form-check-label" for="tagForCommunityAdmin">For community administrators</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="tagForTestBedAdmin" name="tagForTestBedAdmin" [(ngModel)]="domain.tagForTestBedAdmin">
                <label class="form-check-label" for="tagForTestBedAdmin">For Test Bed administrators</label>
            </div>
        </div>
    </div>
</div>
@if (dataService.configuration.automationApiEnabled && domain.id != undefined) {
    <div class="row mt-3">
        <label class="col-3 col-form-label text-end" for="apiKey">API key:</label>
        <div class="col-8 col-md-6">
            <app-api-key-text idName="apiKey" name="apiKey" [key]="domain.apiKey!"></app-api-key-text>
        </div>
        <div app-tooltip class="col-auto" [tbTooltip]="'The key to use when calling the Test Bed\'s REST API to identify the '+dataService.labelDomainLower()+'.'"></div>
    </div>
}
