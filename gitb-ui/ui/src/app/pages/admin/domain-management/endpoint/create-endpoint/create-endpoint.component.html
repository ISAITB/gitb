<div class="page domains detail options create-option">
	<div class="card mb-0">
		<div class="card-header">
			<div class="card-title">Create {{dataService.labelEndpointLower()}}</div>
		</div>
		<form (ngSubmit)="createEndpoint()">
			<div class="card-body">
                <app-endpoint-form [endpoint]="endpoint"></app-endpoint-form>
			</div>
			<div class="card-footer">
				<div class="btn-toolbar">
					<button class="btn btn-secondary" [labelIcon]="Constants.BUTTON_ICON.SAVE" type="submit" [disable]="saveDisabled()" [pending]="pending">Save</button>
					<button class="btn btn-secondary" [labelIcon]="Constants.BUTTON_ICON.CANCEL" type="button" (click)="cancel()">Cancel</button>
				</div>
			</div>
		</form>
	</div>
</div>
