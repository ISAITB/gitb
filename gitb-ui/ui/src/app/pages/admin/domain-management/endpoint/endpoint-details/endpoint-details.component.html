<div class="page endpoint detail detail-actor">
	<div class="card">
		<div class="card-header">
			<div class="card-title">{{dataService.labelEndpoint()}} details</div>
            <div app-domain-tag-indicator></div>
		</div>
		<form (ngSubmit)="saveChanges()">
			<div class="card-body" [pending]="!loaded" focus="name">
                <app-endpoint-form [endpoint]="endpoint"></app-endpoint-form>
			</div>
			<div class="card-footer button-container">
				<div class="btn-toolbar">
					<button type="submit" [labelIcon]="Constants.BUTTON_ICON.SAVE" class="btn btn-secondary" [disable]="saveDisabled()" [pending]="savePending">Save changes</button>
					<button (click)="back()" [labelIcon]="Constants.BUTTON_ICON.BACK" type="button" class="btn btn-secondary">Back</button>
				</div>
				<div class="btn-toolbar btn-toolbar-delete">
					<button (click)="delete()" [labelIcon]="Constants.BUTTON_ICON.DELETE" type="button" class="btn btn-outline-danger" [pending]="deletePending" [disable]="!loaded || savePending">Delete</button>
				</div>
			</div>
		</form>
	</div>
	<div>
        <ul ngbNav #tabs="ngbNav" class="nav-tabs" [(activeId)]="tabIdToShow" (activeIdChange)="showTab()" [animation]="false">
            <li [ngbNavItem]="Constants.TAB.DOMAIN.SPECIFICATIONS">
                <button ngbNavLink class="nav-link tabClass"><app-tab-title [icon]="Constants.BUTTON_ICON.CONFIGURATION_PROPERTIES" text="Parameters"></app-tab-title></button>
                <ng-template ngbNavContent>
                    <div class="tabPanel">
                        <app-endpoint-parameter-tab-content
                            [actorId]="actorId"
                            [endpointId]="endpointId"
                            [parametersLoaded]="parametersLoaded"></app-endpoint-parameter-tab-content>
                    </div>
                </ng-template>
            </li>
        </ul>
        <div [ngbNavOutlet]="tabs"></div>
	</div>
</div>
